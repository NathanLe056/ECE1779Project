apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2  # runs two instances of the API
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-container
        image: tournament-api:v1
        imagePullPolicy: Never # tells K8s to use the local image
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: api-secrets